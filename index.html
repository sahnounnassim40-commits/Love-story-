
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى هبة ❤️</title>
    <style>
        :root {
            --primary-pink: #ff769f;
            --soft-pink: #fff0f3;
            --dark-pink: #d63031;
            --accent-yellow: #ffeaa7;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--soft-pink);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4a4a4a;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }
        /* القلوب المتطايرة في الخلفية */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .falling-heart {
            position: absolute;
            color: var(--primary-pink);
            opacity: 0.6;
            animation: floatUp 6s linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(105vh) rotate(0deg); opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
        .container {
            max-width: 600px;
            width: 90%;
            margin: 30px auto;
            text-align: center;
            background: #ffffff;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(253, 121, 168, 0.15);
            position: relative;
        }
        h1 { color: var(--dark-pink); font-size: 2.5rem; margin-bottom: 10px; }
        .heart-main { color: var(--primary-pink); font-size: 3.5rem; animation: heartbeat 1.2s infinite; margin: 15px 0; }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            20%, 60% { transform: scale(1.15); }
            40% { transform: scale(1.05); }
        }
        /* صندوق الرسائل التفاعلي */
        .message-box {
            background: #fff;
            border: 2px dashed var(--primary-pink);
            padding: 20px;
            border-radius: 15px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            line-height: 1.8;
            color: #555;
            margin: 20px 0;
            transition: all 0.3s ease;
        }
        .nav-btn {
            background: var(--primary-pink);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            margin: 5px;
        }
        .nav-btn:disabled { background: #ccc; }
        /* العداد */
        .counter-title { font-size: 1.2rem; color: #2d3436; font-weight: bold; margin-top: 25px; }
        .countdown { display: flex; justify-content: center; gap: 12px; margin-top: 15px; flex-wrap: wrap; }
        .time-box { background: var(--accent-yellow); color: #2d3436; padding: 10px 15px; border-radius: 12px; font-weight: bold; min-width: 65px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .time-box span { display: block; font-size: 1.6rem; color: var(--dark-pink); }
        /* لوحة التحكم والمسؤول */
        .admin-section { margin-top: 50px; padding-top: 20px; border-top: 1px dashed #ddd; }
        .admin-toggle { background: none; border: none; color: #b2bec3; cursor: pointer; font-size: 0.85rem; text-decoration: underline; }
        .admin-panel { display: none; background: #f9f9f9; padding: 20px; border-radius: 15px; margin-top: 15px; text-align: right; border: 1px solid #eee; }
        .admin-panel input, .admin-panel textarea { width: 100%; box-sizing: border-box; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
        .admin-panel button { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hearts-bg" id="heartsBg"></div>

    <div class="container">
        <h1>إلى هبة ❤️</h1>
        <div class="heart-main">❤️</div>
        
        <!-- صندوق الرسائل التفاعلي -->
        <div class="message-box" id="msgDisplay">جاري تحميل الرسائل...</div>
        <div>
            <button class="nav-btn" id="prevBtn" onclick="changeMessage(-1)">👈 السابق</button>
            <button class="nav-btn" id="nextBtn" onclick="changeMessage(1)">التالي 👉</button>
        </div>

        <!-- العداد -->
        <div class="counter-title">الوقت الذي عشناه معاً:</div>
        <div class="countdown">
            <div class="time-box"><span id="days">0</span>أيام</div>
            <div class="time-box"><span id="hours">0</span>ساعات</div>
            <div class="time-box"><span id="minutes">0</span>دقائق</div>
            <div class="time-box"><span id="seconds">0</span>ثوانٍ</div>
        </div>

        <!-- قسم لوحة التحكم السري -->
        <div class="admin-section">
            <button class="admin-toggle" onclick="toggleAdminPanel()">دخول لوحة التحكم (خاص بـ MK)</button>
            
            <div class="admin-panel" id="adminPanel">
                <div id="authBox">
                    <label>أدخل كلمة المرور السرية:</label>
                    <input type="password" id="adminPass" placeholder="كلمة المرور...">
                    <button onclick="loginAdmin()">دخول</button>
                </div>
                <div id="controlBox" style="display:none;">
                    <h3>تعديل بيانات الموقع ✨</h3>
                    <label>تاريخ البداية (السنة-الشهر-اليوم):</label>
                    <input type="date" id="newDate">
                    
                    <label>الرسائل الموجهة لهبة (اكتب كل رسالة في سطر مستقل):</label>
                    <textarea id="newMessages" rows="6" placeholder="اكتب كل رسالة هنا ثم اضغط انتر لتبدأ رسالة جديدة..."></textarea>
                    
                    <button onclick="saveAdminChanges()">حفظ وتحديث الموقع 💾</button>
                </div>
            </div>
        </div>

        <div class="footer" style="margin-top: 30px; font-size: 0.85rem; color: #b2bec3;">صُنع بكل حب لأجل هبة ✨</div>
    </div>

    <script>
        // البيانات الافتراضية الأولية
        const defaultDate = "2025-11-01";
        const defaultMessages = [
            "كل يوم يمر معكِ هو أجمل أيام عمري. صممت هذا المكان الخاص لأجلكِ يا هبة ❤️",
            "أنتِ لستِ فقط شخصاً غالياً، أنتِ الجزء الأجمل والأثمن في كل تفاصيل حياتي ✨",
            "أعدكِ أن أظل بجانبكِ، وأن نحسب أيامنا معاً ثانية بثانية وللأبد 🔒"
        ];

        // تحميل البيانات من الذاكرة أو استخدام الافتراضية
        let savedDate = localStorage.getItem('loveStartDate') || defaultDate;
        let savedMessages = JSON.parse(localStorage.getItem('loveMessages')) || defaultMessages;
        let currentMsgIndex = 0;

        // تشغيل عداد الوقت
        function updateCounter() {
            const startDate = new Date(savedDate);
            const now = new Date();
            const difference = now - startDate;

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours;
            document.getElementById("minutes").innerText = minutes;
            document.getElementById("seconds").innerText = seconds;
        }
        setInterval(updateCounter, 1000);

        // عرض وتغيير الرسائل التفاعلية
        function displayMessage() {
            if(savedMessages.length === 0) {
                document.getElementById("msgDisplay").innerText = "لا توجد رسائل حالياً.";
                return;
            }
            document.getElementById("msgDisplay").innerText = savedMessages[currentMsgIndex];
            document.getElementById("prevBtn").disabled = currentMsgIndex === 0;
            document.getElementById("nextBtn").disabled = currentMsgIndex === savedMessages.length - 1;
        }

        function changeMessage(direction) {
            currentMsgIndex += direction;
            if(currentMsgIndex < 0) currentMsgIndex = 0;
            if(currentMsgIndex >= savedMessages.length) currentMsgIndex = savedMessages.length - 1;
            displayMessage();
        }

        // إنشاء القلوب المتطايرة في الخلفية
        function createFallingHearts() {
            const bg = document.getElementById("heartsBg");
            setInterval(() => {
                const heart = document.createElement("div");
                heart.classList.add("falling-heart");
                heart.innerHTML = "❤️";
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.fontSize = (Math.random() * 15 + 15) + "px";
                heart.style.animationDuration = (Math.random() * 3 + 4) + "s";
                bg.appendChild(heart);
                setTimeout(() => { heart.remove(); }, 7000);
            }, 400);
        }

        // نظام لوحة التحكم (Admin Panel)
        function toggleAdminPanel() {
            const panel = document.getElementById("adminPanel");
            panel.style.display = panel.style.display === "block" ? "none" : "block";
        }

        function loginAdmin() {
            const pass = document.getElementById("adminPass").value;
            if(pass === "Mk") {
                document.getElementById("authBox").style.display = "none";
                document.getElementById("controlBox").style.display = "block";
                // تعبئة البيانات الحالية داخل اللوحة لسهولة التعديل
                document.getElementById("newDate").value = savedDate;
                document.getElementById("newMessages").value = savedMessages.join("\n");
            } else {
                alert("كلمة المرور غير صحيحة! خاصة بـ MK فقط.");
            }
        }

        function saveAdminChanges() {
            const newDateVal = document.getElementById("newDate").value;
            const newLines = document.getElementById("newMessages").value.split("\n").filter(line => line.trim() !== "");

            if(newDateVal) {
                localStorage.setItem('loveStartDate', newDateVal);
                savedDate = newDateVal;
            }
            if(newLines.length > 0) {
                localStorage.setItem('loveMessages', JSON.stringify(newLines));
                savedMessages = newLines;
            }

            currentMsgIndex = 0;
            displayMessage();
            updateCounter();
            alert("تم تحديث وحفظ بيانات الموقع بنجاح يا بطل! ❤️");
            toggleAdminPanel();
        }

        // تشغيل الدوال عند تحميل الصفحة
        window.onload = function() {
            displayMessage();
            updateCounter();
            createFallingHearts();
        };
    </script>
</body>
</html>
