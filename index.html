<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>عالم هبة السحري التفاعلي 👑</title>
    <style>
        /* نفس التصميم الجميل السابق */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #fdf2f8 0%, #fff1f2 50%, #fffbeb 100%); min-height: 100vh; color: #1f2937; overflow-x: hidden; padding-bottom: 100px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; gap: 30px; }
        
        /* البطاقات */
        .card { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(10px); padding: 25px; border-radius: 24px; border: 1px solid #fce7f3; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); text-align: center; }
        .header-section h1 { font-size: 28px; color: #db2777; font-weight: 800; }
        
        /* (أضف هنا باقي الـ CSS الخاص بك من الكود السابق ليعمل التصميم كاملاً) */
    </style>
</head>
<body>

    <!-- تم حذف شاشة القفل، المحتوى يظهر مباشرة -->
    <audio id="bgMusic" src="another-love.mp3" loop></audio>

    <div class="container">
        <div class="card header-section">

            <p>مرحباً بكِ يا ملكة، هذا العالم صُمم لأجلك وحدك!</p>
        </div>
        
        <!-- هنا ضع باقي محتويات موقعك (العداد، الألعاب، إلخ) كما كانت في الكود السابق -->
    </div>

    <script>
        // تشغيل الأنظمة فوراً عند تحميل الصفحة
        window.onload = function() {
            startLiveSystems();
        };

        function startLiveSystems() {
            // كود العدادات والأنظمة التفاعلية
            console.log("النظام يعمل مباشرة!");
            // تأكد من إضافة باقي دوال الـ JavaScript الخاصة بك هنا
        }
    </script>
</body>
</html>
