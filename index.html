<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم هبة السحري</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: linear-gradient(135deg, #fdf2f8, #fff1f2); min-height: 100vh; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; }
        input { padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 80%; margin: 10px 0; }
        button { padding: 12px 25px; background: #db2777; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="msgTitle">مرحباً بهبة 👑</h1>
        <p id="msgBody">أهلاً بكِ في عالمك السري والخاص.</p>
    </div>

    <div class="card">
        <h3>لوحة الأدمن ⚙️</h3>
        <input type="password" id="adminPass" placeholder="كلمة سر الأدمن...">
        <div id="adminPanel" style="display:none;">
            <input type="text" id="newMsg" placeholder="رسالة جديدة لهبة...">
            <button onclick="updateMsg()">تحديث الرسالة</button>
        </div>
        <button id="loginBtn" onclick="checkAdmin()">دخول الأدمن</button>
    </div>

    <script>
        // تحميل الرسالة عند فتح الصفحة
        document.getElementById('msgBody').innerText = localStorage.getItem('siteMsg') || "أنتِ أجمل ملكة في هذا العالم ❤️";

        function checkAdmin() {
            if(document.getElementById('adminPass').value === "1234") {
                document.getElementById('adminPanel').style.display = "block";
                document.getElementById('loginBtn').style.display = "none";
            } else {
                alert("كلمة سر خاطئة!");
            }
        }

        function updateMsg() {
            const newText = document.getElementById('newMsg').value;
            localStorage.setItem('siteMsg', newText);
            document.getElementById('msgBody').innerText = newText;
            alert("تم التحديث! اطلبي من هبة تحديث الصفحة لترى الرسالة.");
        }
    </script>
</body>
</html>
